name: Cronjob
on:
  schedule:
    - cron: '* * * * *' # Runs every day at midnight

jobs:
    cron:    
     runs-on: ubuntu-latest

     steps:
       - name:  Clone Repository
         uses: actions/checkout@v2
    
       - name: Setup python
         uses: actions/setup-python@v2
         with:
            python-version: '3.x'
       - name: Run Python Script
         run: python hello.py

      